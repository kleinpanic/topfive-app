name: CI

on:
  push:
    branches: [main]
  pull_request:
    branches: [main]

permissions:
  contents: read

jobs:
  build-and-test:
    name: Build & Test
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt
          pip install pytest --quiet

      - name: Run tests
        run: pytest tests/ -v

      - name: Flask smoke test
        run: |
          python -c "from app import app; print('Flask app imports OK')"

  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.11"

      - name: Check Python syntax
        run: python -m py_compile app.py

      - name: Verify templates exist
        run: |
          # Verify all template files are valid HTML
          for f in templates/*.html; do
            if grep -q '<!DOCTYPE html>' "$f"; then
              echo "✓ $(basename $f) is valid HTML"
            else
              echo "✗ $(basename $f) missing DOCTYPE"
              exit 1
            fi
          done
